<header>
    <h1>沖縄の概要</h1>
</header>

<div class="container">
    <img src="https://098free.com/img/nature/ritou/038T0A7380_m.jpg" alt="久米島・奥武島の橋からの景色">
    <p>
        沖縄県は、日本の最南端に位置する県で、160以上の島々から構成されています。
        一年を通して温暖な亜熱帯気候に恵まれ、美しい青い海と白い砂浜が広がる、日本を代表するリゾート地です。
    </p>

    <p>
        沖縄は、かつて琉球王国として栄えた歴史を持ち、日本本土とは異なる独自の文化や伝統が受け継がれています。
        また、豊かな自然やサンゴ礁、多様な生き物が生息しており、国内外から多くの観光客が訪れます。
    </p>

    <p>
        温暖な気候、豊かな自然、そして歴史と文化が調和した沖縄は、多くの人々を魅了し続けている地域です。
    </p>

</div>

</body>
